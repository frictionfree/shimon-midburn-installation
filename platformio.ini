; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ---- Simulation env (Wokwi) ----
[platformio]
default_envs = hardware

[env:sim]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
  -D USE_WOKWI           ; enables DFPlayer stub + sim-specific tweaks
  -D ARDUINO_USB_CDC_ON_BOOT=0  ; disable USB CDC, use UART

; ---- Real hardware env ESP32-DevKitC V4 (with DFPlayer Mini) ----
[env:hardware]
platform = espressif32
board = esp32dev  ; esp32dev works for DevKitC V4
framework = arduino
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
lib_deps =

  dfrobot/DFRobotDFPlayerMini@^1.0.6
build_flags =
  ; No USE_WOKWI flag - enables real DFPlayer integration

; ---- Hardware env for COM6 ----
[env:hardware-com6]
platform = espressif32
board = esp32dev  ; esp32dev works for DevKitC V4
framework = arduino
upload_port = COM6
monitor_port = COM6
monitor_speed = 115200
lib_deps =

  dfrobot/DFRobotDFPlayerMini@^1.0.6
build_flags =
  ; No USE_WOKWI flag - enables real DFPlayer integration

; ---- Party Mode Proof of Concept ----
[env:party-poc]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
lib_deps =
  ; No external libs - uses ESP-IDF I2S driver directly
build_flags =
  -D PARTY_MODE_POC        ; Identify POC build
build_src_filter =
  +<../poc/>               ; Only compile POC source files
  -<../src/>               ; Exclude main game code

; ---- Alternative: DevKitC V4 specific env ----
;[env:devkitc-v4]
;platform = espressif321claue

;board = esp32dev  ; Generic ESP32 board definition works
;framework = arduino
;monitor_speed = 115200
;lib_deps =
  ;dfrobot/DFRobotDFPlayerMini@^1.0.6
;build_flags =
  ;-D BOARD_HAS_PSRAM=1  ; Enable if using WROVER variant with PSRAM

; ---- Pattern tester: single pattern at fixed 120 BPM, no MIDI/I2S/audio ----
; Pass PatternID on the command line — no need to edit this file:
;   pio run -e pattern_test --project-option="build_flags=-D PATTERN_TEST=8" -t upload
; PatternID integers are defined in include/party_patterns.h (new patterns appended to end of enum)
; build_flags below is just a fallback default (STD-01) if no override is given
[env:pattern_test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
build_flags = -D PATTERN_TEST=0   ; fallback default: STD-01. Override on command line (see above)
build_src_filter = +<hw.cpp> +<party_patterns.cpp> +<main_pattern_test.cpp>

; ---- (Optional) Native unit tests on your Mac ----
;[env:native]
;platform = native
;build_flags =
;  -D UNIT_TESTS
